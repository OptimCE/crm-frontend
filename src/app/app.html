<div class="app-layout-wrapper">
  @if (showNavbar) {
    <app-navbar (sidebarPinChanged)="sidebarPinned = $event"></app-navbar>
    <main class="app-content" [class.app-content--sidebar-pinned]="sidebarPinned">
      <router-outlet></router-outlet>
    </main>
  } @else {
    <main class="app-content-auth">
      <router-outlet></router-outlet>
    </main>
  }
</div>
<p-toast position="bottom-right" key="br"></p-toast>
