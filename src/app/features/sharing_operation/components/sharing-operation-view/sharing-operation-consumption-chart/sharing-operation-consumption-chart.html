<form
  [formGroup]="formChart"
  class="flex flex-col sm:flex-row gap-3 items-end mb-4"
  (submit)="loadChart()"
>
  <div class="flex flex-col gap-1 flex-1 sm:flex-initial">
    <label for="dateDeb" class="field-label">
      {{ 'SHARING_OPERATION.VIEW.CONSUMPTION_MONITORING.START_DATE_LABEL' | translate }}
    </label>
    <p-date-picker
      id="dateDeb"
      formControlName="dateDeb"
      dateFormat="dd/mm/yy"
      [firstDayOfWeek]="1"
      styleClass="w-full"
    ></p-date-picker>
    <app-error-handler controlName="dateDeb"></app-error-handler>
  </div>
  <div class="flex flex-col gap-1 flex-1 sm:flex-initial">
    <label for="dateFin" class="field-label">
      {{ 'SHARING_OPERATION.VIEW.CONSUMPTION_MONITORING.END_DATE_LABEL' | translate }}
    </label>
    <p-date-picker
      id="dateFin"
      formControlName="dateFin"
      dateFormat="dd/mm/yy"
      [firstDayOfWeek]="1"
      styleClass="w-full"
    ></p-date-picker>
    <app-error-handler controlName="dateFin"></app-error-handler>
  </div>
  <p-button
    pRipple
    label="{{ 'SHARING_OPERATION.VIEW.CONSUMPTION_MONITORING.SEARCH_BUTTON_LABEL' | translate }}"
    icon="pi pi-search"
    type="submit"
  ></p-button>
</form>

@if (!data()) {
  <div class="flex flex-col items-center justify-center py-12 gap-3">
    <i class="pi pi-chart-bar text-3xl text-surface-300"></i>
    <p class="text-surface-400 m-0 text-sm">
      {{ 'SHARING_OPERATION.VIEW.CONSUMPTION_MONITORING.SELECT_DATES_HINT' | translate }}
    </p>
  </div>
} @else {
  <div class="mb-4">
    <p-chart type="bar" [data]="data()" [options]="options" />
  </div>
}

@if (displayDownloadButton()) {
  <div class="flex justify-center">
    <p-button
      pRipple
      [outlined]="true"
      icon="pi pi-download"
      label="{{
        'SHARING_OPERATION.VIEW.CONSUMPTION_MONITORING.DOWNLOAD_BUTTON_LABEL' | translate
      }}"
      (click)="downloadTotalConsumption()"
    ></p-button>
  </div>
}
