<div class="container mx-auto my-auto">
  <app-header-page
    data-testid="invitations__hero"
    icon="pi pi-envelope"
    [text]="'INVITATION.TITLE' | translate"
    [subtitle]="'INVITATION.SUBTITLE' | translate"
    class="block mb-4"
  />

  <!-- Tabs -->
  <p-tabs data-testid="invitations__tabs" value="0">
    <p-tablist>
      <p-tab data-testid="invitations__tab--member" value="0">
        <i class="pi pi-users mr-2"></i>
        {{ 'INVITATION.MEMBER.TITLE' | translate }}
      </p-tab>
      <p-tab data-testid="invitations__tab--manager" value="1">
        <i class="pi pi-briefcase mr-2"></i>
        {{ 'INVITATION.MANAGER.TITLE' | translate }}
      </p-tab>
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel value="0">
        <app-invitation-member></app-invitation-member>
      </p-tabpanel>
      <p-tabpanel value="1">
        <app-invitation-gestionnaire></app-invitation-gestionnaire>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
