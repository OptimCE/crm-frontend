<div class="container mx-auto my-auto">
  <!-- Hero Header -->
  <div
    data-testid="invitations__hero"
    class="invitations-hero rounded-xl border border-primary-100 p-5 md:p-6 flex flex-col sm:flex-row items-start sm:items-center gap-4 mb-4"
  >
    <div class="flex items-center justify-center w-14 h-14 rounded-full bg-primary-100">
      <i class="pi pi-envelope text-primary-700 text-2xl"></i>
    </div>
    <div class="flex flex-col gap-0.5 flex-1 min-w-0">
      <h1 class="text-xl md:text-2xl font-semibold text-surface-900">
        {{ 'INVITATION.TITLE' | translate }}
      </h1>
      <p class="text-sm text-surface-500 m-0">
        {{ 'INVITATION.SUBTITLE' | translate }}
      </p>
    </div>
  </div>

  <!-- Tabs -->
  <p-tabs data-testid="invitations__tabs" value="0">
    <p-tablist>
      <p-tab data-testid="invitations__tab--member" value="0">
        <i class="pi pi-users mr-2"></i>
        {{ 'INVITATION.MEMBER.TITLE' | translate }}
      </p-tab>
      <p-tab data-testid="invitations__tab--manager" value="1">
        <i class="pi pi-briefcase mr-2"></i>
        {{ 'INVITATION.MANAGER.TITLE' | translate }}
      </p-tab>
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel value="0">
        <app-invitation-member></app-invitation-member>
      </p-tabpanel>
      <p-tabpanel value="1">
        <app-invitation-gestionnaire></app-invitation-gestionnaire>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
