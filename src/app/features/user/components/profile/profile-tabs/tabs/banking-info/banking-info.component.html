<div class="max-w-md">
  <div class="bg-surface-50 border border-surface-200 rounded-xl p-5">
    <div class="flex items-center gap-3 mb-4">
      <div
        class="w-10 h-10 rounded-lg bg-primary-50 text-primary-600 flex items-center justify-center"
      >
        <i class="pi pi-credit-card text-lg"></i>
      </div>
      <h3 class="text-base font-semibold text-surface-800">
        {{ 'PROFILE.TABS.BANKING_INFORMATION.IBAN' | translate }}
      </h3>
    </div>

    @if (user()?.iban) {
      <div class="flex items-center gap-2">
        <span class="text-base font-mono text-surface-800 tracking-wider">
          {{ user()!.iban }}
        </span>
        <p-button
          [text]="true"
          [rounded]="true"
          icon="pi pi-copy"
          severity="secondary"
          pTooltip="{{ 'PROFILE.COPY_IBAN' | translate }}"
          tooltipPosition="top"
          (click)="copyIban()"
        />
      </div>
    } @else {
      <div class="flex items-center gap-2">
        <i class="pi pi-info-circle text-sm text-surface-300"></i>
        <span class="field-empty">--</span>
      </div>
    }
  </div>
</div>
