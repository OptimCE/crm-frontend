<div class="container mx-auto my-auto">
  <div class="flex flex-wrap -mx-2 mb-3 flex-col lg:flex-row items-center lg:justify-between">
    <app-header-page icon="pi pi-key" [text]="'KEY.LIST.TITLE' | translate"></app-header-page>
    <p-toast />
    <p-split-button
      label="{{ 'KEY.LIST.ADD_BUTTON_LABEL' | translate }}"
      icon="pi pi-plus"
      (onClick)="addKey()"
      [model]="optionsSplitButton"
    >
    </p-split-button>
  </div>
  <p-table
    #dt
    [value]="keysList()"
    (onLazyLoad)="lazyLoadKeys($event)"
    [rows]="paginated().limit"
    [totalRecords]="paginated().total"
    [first]="(paginated().page - 1) * paginated().limit"
    [currentPageReportTemplate]="currentPageReportTemplate()"
    (onPage)="pageChange($event)"
    [lazy]="lazy"
  >
    <ng-template #caption>
      <div class="flex justify-between">
        <p-button
          [outlined]="true"
          icon="pi pi-filter-slash"
          label="{{ 'KEY.LIST.ERASE_FILTERS_BUTTON_LABEL' | translate }}"
          (onClick)="clear(dt)"
        ></p-button>
      </div>
    </ng-template>
    <ng-template #header>
      <tr class="max-lg:hidden">
        <th [pSortableColumn]="'nom'" class="text-base px-3">
          {{ 'KEY.LIST.NAME_LABEL' | translate }}
          <p-sortIcon [field]="'nom'"></p-sortIcon>
          <br />
          <p-columnFilter
            type="text"
            field="nom"
            display="{{ 'KEY.LIST.NAME_LABEL' | translate }}"
            [showMatchModes]="false"
            [showOperator]="false"
            [showAddButton]="false"
          ></p-columnFilter>
        </th>
        <th [pSortableColumn]="'description'" class="text-base px-3">
          {{ 'KEY.LIST.DESCRIPTION_LABEL' | translate }}
          <p-sortIcon [field]="'description'"></p-sortIcon>
          <br />
          <p-columnFilter
            type="text"
            field="description"
            display="{{ 'KEY.LIST.DESCRIPTION_LABEL' | translate }}"
            [showMatchModes]="false"
            [showOperator]="false"
            [showAddButton]="false"
          ></p-columnFilter>
        </th>
      </tr>
    </ng-template>
    <ng-template #body let-key>
      <tr
        routerLink="/keys/{{ key.id }}"
        class="grid grid-cols-2 lg:table-row flex-wrap hover:bg-green-50! cursor-pointer"
      >
        <td>
          <div class="flex flex-col lg:flex-row">
            <span class="visible lg:hidden font-medium">
              {{ 'KEY.LIST.NAME_LABEL' | translate }}
            </span>
          </div>
          <span class="text-sm">{{ key.name }}</span>
        </td>
        <td>
          <div class="flex flex-col lg:flex-row">
            <span class="visible lg:hidden font-medium">
              {{ 'KEY.LIST.DESCRIPTION_LABEL' | translate }}
            </span>
          </div>
          <span class="text-sm">{{ key.description }}</span>
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="2">{{ 'KEY.LIST.EMPTY' | translate }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
