<div class="max-w-md">
  <div class="bg-surface-50 border border-surface-200 rounded-xl p-5">
    <div class="flex items-center gap-3 mb-4">
      <div
        class="w-10 h-10 rounded-lg bg-primary-50 text-primary-600 flex items-center justify-center"
      >
        <i class="pi pi-credit-card text-lg"></i>
      </div>
      <h3 class="text-base font-semibold text-surface-800 m-0">
        {{ 'MEMBER.VIEW.BANK_TITLE' | translate }}
      </h3>
    </div>

    @if (member()?.iban) {
      <div class="flex items-center gap-2">
        <span
          class="text-base font-mono text-surface-800 tracking-wider"
          data-testid="member-view-banking-info-tab__text--iban"
        >
          {{ member()!.iban }}
        </span>
        <p-button
          [text]="true"
          [rounded]="true"
          icon="pi pi-copy"
          severity="secondary"
          pTooltip="{{ 'COMMON.COPY_TO_CLIPBOARD' | translate }}"
          tooltipPosition="top"
          (click)="copyIban()"
          data-testid="member-view-banking-info-tab__btn--copy-iban"
        />
      </div>
    } @else {
      <div class="flex items-center gap-2">
        <i class="pi pi-info-circle text-sm text-surface-300"></i>
        <span class="field-empty">--</span>
      </div>
    }
  </div>
</div>
