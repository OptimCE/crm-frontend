<form [formGroup]="form()" (submit)="submit()">
  @if (typeClient() === MemberType.INDIVIDUAL) {
    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-3">
      <div class="md:col-span-2 flex flex-col">
        <label for="nrn" class="field-label">
          {{ 'MEMBER.ADD.INFORMATIONS.SOCIAL_SECURITY_NUMBER_LABEL' | translate }} *
        </label>
        <input
          pInputText
          type="text"
          name="nrn"
          id="nrn"
          placeholder="123456789"
          formControlName="id"
          class="w-full"
          data-testid="new-member-informations__input--nrn"
        />
        <app-error-handler controlName="id" [errorsAdd]="idErrorAdded()" />
      </div>
      <div class="flex flex-col">
        <label for="surname" class="field-label">
          {{ 'MEMBER.ADD.INFORMATIONS.SURNAME_LABEL' | translate }} *
        </label>
        <input
          pInputText
          type="text"
          name="surname"
          id="surname"
          placeholder="Doe"
          formControlName="surname"
          data-testid="new-member-informations__input--surname"
        />
        <app-error-handler controlName="surname" />
      </div>
      <div class="flex flex-col">
        <label for="name" class="field-label">
          {{ 'MEMBER.ADD.INFORMATIONS.FIRST_NAME_LABEL' | translate }} *
        </label>
        <input
          pInputText
          type="text"
          name="name"
          id="name"
          placeholder="John"
          formControlName="name"
          data-testid="new-member-informations__input--name"
        />
        <app-error-handler controlName="name" />
      </div>
      <div class="flex flex-col">
        <label for="email" class="field-label">
          {{ 'MEMBER.ADD.INFORMATIONS.EMAIL_LABEL' | translate }} *
        </label>
        <input
          pInputText
          type="text"
          name="email"
          id="email"
          placeholder="john.doe@gmail.com"
          formControlName="email"
          data-testid="new-member-informations__input--email"
        />
        <app-error-handler controlName="email" />
      </div>
      <div class="flex flex-col">
        <label for="phone" class="field-label">
          {{ 'MEMBER.ADD.INFORMATIONS.PHONE_NUMBER_LABEL' | translate }} *
        </label>
        <input
          pInputText
          type="text"
          name="phone"
          id="phone"
          placeholder="049477113344"
          formControlName="phone"
          data-testid="new-member-informations__input--phone"
        />
        <app-error-handler controlName="phone" />
      </div>
      <div class="flex items-center gap-2">
        <p-checkbox
          id="social_rate"
          formControlName="socialRate"
          value="true"
          inputId="socialRate"
          data-testid="new-member-informations__checkbox--social-rate"
        />
        <label for="socialRate" class="text-sm">
          {{ 'MEMBER.ADD.INFORMATIONS.SOCIAL_RATE_CHECKBOX_LABEL' | translate }}
        </label>
      </div>
      <div class="flex items-center gap-2">
        <p-checkbox
          id="guardian_ship"
          (onChange)="gestionnaireChange($event)"
          value="true"
          data-testid="new-member-informations__checkbox--guardian"
        />
        <label for="guardian_ship" class="text-sm">
          {{ 'MEMBER.ADD.INFORMATIONS.GUARDIAN_CHECKBOX_LABEL' | translate }}
        </label>
      </div>
    </div>
  } @else if (typeClient() === MemberType.COMPANY) {
    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-3">
      <div class="md:col-span-2 flex flex-col">
        <label for="nrn_soc" class="field-label">
          {{ 'MEMBER.ADD.INFORMATIONS.COMPANY_NUMBER_LABEL' | translate }} *
        </label>
        <input
          pInputText
          type="text"
          name="nrn"
          id="nrn_soc"
          placeholder="123456789"
          formControlName="id"
          class="w-full"
          data-testid="new-member-informations__input--company-number"
        />
        <app-error-handler controlName="id" />
      </div>
      <div class="flex flex-col">
        <label for="name_soc" class="field-label">
          {{ 'MEMBER.ADD.INFORMATIONS.COMPANY_NAME_LABEL' | translate }} *
        </label>
        <input
          pInputText
          type="text"
          name="name"
          id="name_soc"
          placeholder="Locomotrice cie."
          formControlName="name"
          data-testid="new-member-informations__input--company-name"
        />
        <app-error-handler controlName="name" />
      </div>
      <div class="flex flex-col">
        <label for="vatNumber" class="field-label">
          {{ 'MEMBER.ADD.INFORMATIONS.VAT_NUMBER_LABEL' | translate }} *
        </label>
        <input
          pInputText
          type="text"
          name="vatNumber"
          id="vatNumber"
          placeholder="BE0999991234"
          formControlName="vatNumber"
          data-testid="new-member-informations__input--vat-number"
        />
        <app-error-handler controlName="vatNumber" />
      </div>
    </div>
  }

  @if (gestionnaire()) {
    <div class="border-t border-surface-200 mt-5 pt-4">
      <h3 class="text-sm font-semibold text-surface-700 mb-3">
        {{ 'MEMBER.ADD.INFORMATIONS.GUARDIAN_TITLE' | translate }}
      </h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-3">
        <div class="md:col-span-2 flex flex-col">
          <label for="NRN_manager" class="field-label">
            {{ 'MEMBER.ADD.INFORMATIONS.SOCIAL_SECURITY_NUMBER_LABEL' | translate }} *
          </label>
          <input
            pInputText
            type="text"
            name="NRN_manager"
            id="NRN_manager"
            placeholder="123456789"
            formControlName="NRN_manager"
            class="w-full"
            data-testid="new-member-informations__input--manager-nrn"
          />
          <app-error-handler controlName="NRN_manager" [errorsAdd]="idErrorAdded()" />
        </div>
        <div class="flex flex-col">
          <label for="surname_manager" class="field-label">
            {{ 'MEMBER.ADD.INFORMATIONS.SURNAME_LABEL' | translate }} *
          </label>
          <input
            pInputText
            type="text"
            name="surname_manager"
            id="surname_manager"
            placeholder="Doe"
            formControlName="surname_manager"
            data-testid="new-member-informations__input--manager-surname"
          />
          <app-error-handler controlName="surname_manager" />
        </div>
        <div class="flex flex-col">
          <label for="name_manager" class="field-label">
            {{ 'MEMBER.ADD.INFORMATIONS.FIRST_NAME_LABEL' | translate }} *
          </label>
          <input
            pInputText
            type="text"
            name="name_manager"
            id="name_manager"
            placeholder="John"
            formControlName="name_manager"
            data-testid="new-member-informations__input--manager-name"
          />
          <app-error-handler controlName="name_manager" />
        </div>
        <div class="flex flex-col">
          <label for="email_manager" class="field-label">
            {{ 'MEMBER.ADD.INFORMATIONS.EMAIL_LABEL' | translate }} *
          </label>
          <input
            pInputText
            type="text"
            name="email_manager"
            id="email_manager"
            placeholder="john.doe@gmail.com"
            formControlName="email_manager"
            data-testid="new-member-informations__input--manager-email"
          />
          <app-error-handler controlName="email_manager" />
        </div>
        <div class="flex flex-col">
          <label for="phone_manager" class="field-label">
            {{ 'MEMBER.ADD.INFORMATIONS.PHONE_NUMBER_LABEL' | translate }} *
          </label>
          <input
            pInputText
            type="text"
            name="phone_manager"
            id="phone_manager"
            placeholder="049477113344"
            formControlName="phone_manager"
            data-testid="new-member-informations__input--manager-phone"
          />
          <app-error-handler controlName="phone_manager" />
        </div>
      </div>
    </div>
  }

  <app-summary-error
    [errorsAdd]="errorsSummaryAdded()"
    [controlLabels]="{
      id: 'MEMBER.ADD.INFORMATIONS.FORM_ERROR.ID',
      surname: 'MEMBER.ADD.INFORMATIONS.FORM_ERROR.SURNAME',
      name: 'MEMBER.ADD.INFORMATIONS.FORM_ERROR.NAME',
      email: 'MEMBER.ADD.INFORMATIONS.FORM_ERROR.EMAIL',
      phone: 'MEMBER.ADD.INFORMATIONS.FORM_ERROR.PHONE',
      socialRate: 'MEMBER.ADD.INFORMATIONS.FORM_ERROR.SOCIALRATE',
      vatNumber: 'MEMBER.ADD.INFORMATIONS.FORM_ERROR.VATNUMBER',
      NRN_manager: 'MEMBER.ADD.INFORMATIONS.FORM_ERROR.NRN_MANAGER',
      surname_manager: 'MEMBER.ADD.INFORMATIONS.FORM_ERROR.SURNAME_MANAGER',
      name_manager: 'MEMBER.ADD.INFORMATIONS.FORM_ERROR.NAME_MANAGER',
      email_manager: 'MEMBER.ADD.INFORMATIONS.FORM_ERROR.EMAIL_MANAGER',
      phone_manager: 'MEMBER.ADD.INFORMATIONS.FORM_ERROR.PHONE_MANAGER',
    }"
  />

  <div class="flex justify-between mt-5 pt-4 border-t border-surface-200">
    <p-button
      [text]="true"
      severity="secondary"
      icon="pi pi-arrow-left"
      [label]="'MEMBER.ADD.INFORMATIONS.BACK_TO_STATUS' | translate"
      (click)="goBack()"
      data-testid="new-member-informations__btn--back"
    />
    <p-button
      pRipple
      type="submit"
      icon="pi pi-arrow-right"
      iconPos="right"
      [label]="'MEMBER.ADD.INFORMATIONS.VALIDATE_INFORMATION_FORM_BUTTON' | translate"
      data-testid="new-member-informations__btn--next"
    />
  </div>
</form>
