<form [formGroup]="ibanForm()" (submit)="submit()">
  <h3 class="text-sm font-semibold text-surface-700 mb-3">
    {{ 'MEMBER.ADD.BANK.BANKING_INFO_TITLE' | translate }}
  </h3>
  <div class="max-w-md">
    <label for="iban" class="field-label"> {{ 'MEMBER.ADD.BANK.IBAN_LABEL' | translate }} * </label>
    <input
      pInputText
      type="text"
      name="iban"
      id="iban"
      placeholder="BE68539007547034"
      formControlName="iban"
      class="w-full"
      data-testid="new-member-banking-info__input--iban"
    />
    <app-error-handler controlName="iban" [errorsAdd]="ibanErrorAdded()" />
  </div>

  <div class="flex justify-between mt-6 pt-4 border-t border-surface-200">
    <p-button
      [text]="true"
      severity="secondary"
      icon="pi pi-arrow-left"
      [label]="'MEMBER.ADD.BANK.BACK_TO_ADDRESS' | translate"
      (click)="goBack()"
      data-testid="new-member-banking-info__btn--back"
    />
    <p-button
      pRipple
      type="submit"
      icon="pi pi-check"
      iconPos="right"
      [label]="'MEMBER.ADD.BANK.VALIDATE_BANKING_INFO_FORM_BUTTON' | translate"
      data-testid="new-member-banking-info__btn--submit"
    />
  </div>
</form>
