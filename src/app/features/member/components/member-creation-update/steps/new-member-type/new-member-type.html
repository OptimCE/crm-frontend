<div class="py-4">
  <span class="field-label mb-4 block"> {{ 'MEMBER.ADD.STATUS.STATUS_TITLE' | translate }} * </span>
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-lg mx-auto">
    <div
      role="button"
      tabindex="0"
      class="border rounded-lg p-5 cursor-pointer transition-all duration-200 hover:shadow-sm"
      [class.border-primary-500]="typeClient() === MemberType.INDIVIDUAL"
      [class.bg-primary-50]="typeClient() === MemberType.INDIVIDUAL"
      [class.border-surface-200]="typeClient() !== MemberType.INDIVIDUAL"
      (click)="typeClient.set(MemberType.INDIVIDUAL)"
    >
      <div class="flex items-center gap-3">
        <p-radioButton
          name="type"
          [value]="MemberType.INDIVIDUAL"
          [ngModel]="typeClient()"
          (ngModelChange)="typeClient.set($event)"
          [ngModelOptions]="{ standalone: true }"
          inputId="particulier"
        />
        <label for="particulier" class="font-medium text-sm cursor-pointer">
          {{ 'MEMBER.ADD.STATUS.INDIVIDUAL_RADIOBUTTON_LABEL' | translate }}
        </label>
      </div>
    </div>
    <div
      role="button"
      tabindex="0"
      class="border rounded-lg p-5 cursor-pointer transition-all duration-200 hover:shadow-sm"
      [class.border-primary-500]="typeClient() === MemberType.COMPANY"
      [class.bg-primary-50]="typeClient() === MemberType.COMPANY"
      [class.border-surface-200]="typeClient() !== MemberType.COMPANY"
      (click)="typeClient.set(MemberType.COMPANY)"
    >
      <div class="flex items-center gap-3">
        <p-radioButton
          name="type"
          [value]="MemberType.COMPANY"
          [ngModel]="typeClient()"
          (ngModelChange)="typeClient.set($event)"
          [ngModelOptions]="{ standalone: true }"
          inputId="entreprise"
        />
        <label for="entreprise" class="font-medium text-sm cursor-pointer">
          {{ 'MEMBER.ADD.STATUS.COMPANY_RADIOBUTTON_LABEL' | translate }}
        </label>
      </div>
    </div>
  </div>
  <div class="flex justify-end mt-6">
    <p-button
      type="button"
      [label]="'MEMBER.ADD.STATUS.VALIDATE_STATUS_FORM_BUTTON' | translate"
      icon="pi pi-arrow-right"
      iconPos="right"
      (click)="submit()"
    />
  </div>
</div>
